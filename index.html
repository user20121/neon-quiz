<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NEON QUIZ | O'zbek tilidagi testlar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            overflow-x: hidden;
            color: #fff;
        }

        /* Neon zarralar */
        .neon-particle {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: floatNeon 8s infinite ease-in-out;
            background: radial-gradient(circle, #ff6b6b, #4ecdc4, #45b7d1);
            border-radius: 50%;
        }

        @keyframes floatNeon {
            0% { opacity: 0; transform: translate(0, 0) scale(0); }
            20% { opacity: 0.5; }
            80% { opacity: 0.3; }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.5); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 15px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .profile-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .profile-avatar:hover { transform: scale(1.05); }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-weight: bold; font-size: 0.9rem; }
        .profile-name small { font-size: 0.7rem; opacity: 0.7; }

        /* Valyuta paneli */
        .currency-panel {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 8px 15px;
        }
        .currency-item { display: flex; align-items: center; gap: 6px; font-size: 1rem; font-weight: bold; }
        .coin-icon { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .balance { color: #4ecdc4; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            box-shadow: 0 0 20px rgba(78,205,196,0.5);
        }

        /* Stats panel */
        .stats-panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(78,205,196,0.3);
            display: flex;
            justify-content: space-between;
        }
        .stat-item { text-align: center; flex: 1; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #4ecdc4; text-shadow: 0 0 10px #4ecdc4; }
        .stat-label { font-size: 0.7rem; opacity: 0.7; }

        /* Subject cards */
        .subjects {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }
        .subject-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(78,205,196,0.3);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .subject-card:hover {
            transform: translateY(-5px);
            border-color: #4ecdc4;
            box-shadow: 0 0 30px rgba(78,205,196,0.3);
        }
        .subject-icon { font-size: 3rem; margin-bottom: 10px; }
        .subject-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .subject-desc { font-size: 0.8rem; opacity: 0.7; }

        /* Difficulty buttons */
        .difficulty-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .difficulty-title { text-align: center; margin-bottom: 15px; font-size: 1.2rem; }
        .difficulty-buttons { display: flex; gap: 10px; }
        .difficulty-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .difficulty-btn.easy { background: linear-gradient(135deg, #00ff88, #00cc66); color: #000; }
        .difficulty-btn.medium { background: linear-gradient(135deg, #ffaa00, #ff8800); color: #000; }
        .difficulty-btn.hard { background: linear-gradient(135deg, #ff3366, #cc0044); color: #fff; }
        .difficulty-btn:hover { transform: scale(1.05); }

        /* Question card */
        .question-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px 20px;
            margin-bottom: 20px;
            border: 2px solid #4ecdc4;
            box-shadow: 0 0 50px rgba(78,205,196,0.2);
        }
        .question-text { font-size: 1.3rem; line-height: 1.4; margin-bottom: 20px; text-align: center; }
        .question-progress { text-align: center; margin-bottom: 15px; color: #4ecdc4; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(78,205,196,0.3);
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option-btn:hover { background: rgba(78,205,196,0.2); transform: translateX(10px); }

        /* Result card */
        .result-card {
            text-align: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #4ecdc4;
        }
        .result-score { font-size: 3rem; color: #4ecdc4; text-shadow: 0 0 30px #4ecdc4; margin: 20px 0; }
        .result-percentage { font-size: 2rem; margin: 10px 0; }

        /* Wheel styles */
        .wheel-container {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .wheel-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }
        .wheel {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.2, 0.9, 0.1, 1.1);
            box-shadow: 0 0 30px rgba(78,205,196,0.5);
        }
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            left: 50%;
            top: 50%;
            transform-origin: 0% 0%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            padding: 5px;
            color: #fff;
            text-shadow: 0 0 3px #000;
        }
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border-radius: 50%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .wheel-pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #ff6b6b;
            z-index: 15;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }
        .spin-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .spin-info {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, #4ecdc4, #45b7d1);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            width: 100%;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(78,205,196,0.5); }
        .btn-secondary { background: linear-gradient(135deg, #ff6b6b, #ff4757); }
        .btn-gold { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0f0c29);
            border-radius: 30px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            border: 2px solid #4ecdc4;
        }
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 15px;
            overflow: hidden;
            cursor: pointer;
        }
        .profile-stats {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .file-input { display: none; }
        .shop-item {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 12px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Win animation */
        .win-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 2000;
            animation: winPulse 0.5s ease-in-out 3;
            text-align: center;
            white-space: nowrap;
        }
        @keyframes winPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }
    </style>
</head>

        // ==================== BARABAN FUNKSIYALARI ====================
        function createWheelSegments(items) {
            const totalChance = items.reduce((sum, item) => sum + item.chance, 0);
            let currentAngle = 0;
            const segments = [];
            
            items.forEach((item, index) => {
                const angle = (item.chance / totalChance) * 360;
                segments.push({
                    name: item.name,
                    angle: angle,
                    color: item.color,
                    reward: item.reward,
                    startAngle: currentAngle,
                    endAngle: currentAngle + angle
                });
                currentAngle += angle;
            });
            
            return segments;
        }

        function getRewardAtAngle(segments, angle) {
            for (const segment of segments) {
                if (angle >= segment.startAngle && angle < segment.endAngle) {
                    return segment;
                }
            }
            return segments[0];
        }

        async function spinWheel(wheelType) {
            if (currentState.isSpinning) {
                showWinNotification("Baraban aylanmoqda, kuting!");
                return;
            }
            
            let items, cost = 0, isFree = false;
            
            if (wheelType === 'free') {
                if (userData.lastFreeSpin) {
                    const lastSpin = new Date(userData.lastFreeSpin);
                    const today = new Date();
                    if (lastSpin.toDateString() === today.toDateString()) {
                        showWinNotification("Bugun bepul spinningizni ishlatgansiz! Ertaga qaytib keling.");
                        return;
                    }
                }
                items = FREE_WHEEL_ITEMS;
                isFree = true;
            } else {
                if ((userData.tokens || 0) < 200) {
                    showWinNotification("Token yetarli emas! 200 token kerak.");
                    return;
                }
                items = TOKEN_WHEEL_ITEMS;
                cost = 200;
            }
            
            currentState.isSpinning = true;
            
            const segments = createWheelSegments(items);
            const wheelElement = document.getElementById('wheel');
            const spinBtn = document.getElementById('spinBtn');
            if (spinBtn) spinBtn.disabled = true;
            
            // Aylanish
            const spins = 8 + Math.random() * 4;
            const finalAngle = 360 * spins + Math.random() * 360;
            
            wheelElement.style.transition = 'transform 4s cubic-bezier(0.2, 0.9, 0.1, 1.1)';
            wheelElement.style.transform = `rotate(${finalAngle}deg)`;
            
            // 4 soniya kutamiz
            await new Promise(resolve => setTimeout(resolve, 4000));
            
            // Qaysi segmentga tushganini aniqlash
            const actualAngle = finalAngle % 360;
            const selectedSegment = getRewardAtAngle(segments, actualAngle);
            
            // Yutuqni qo'shish
            if (isFree) {
                userData.lastFreeSpin = new Date().toISOString();
            } else {
                userData.tokens -= cost;
            }
            
            let winText = "";
            if (selectedSegment.reward.tokens) {
                userData.tokens = (userData.tokens || 0) + selectedSegment.reward.tokens;
                winText = `${selectedSegment.reward.tokens} Token yutdingiz!`;
            }
            if (selectedSegment.reward.points) {
                userData.totalScore += selectedSegment.reward.points;
                winText = `${selectedSegment.reward.points} Ball yutdingiz!`;
            }
            if (selectedSegment.reward.premium) {
                userData.premiumQuestions = (userData.premiumQuestions || 0) + selectedSegment.reward.premium;
                winText = `Premium savol yutdingiz!`;
            }
            
            saveUserData();
            showWinNotification(winText);
            
            setTimeout(() => {
                if (spinBtn) spinBtn.disabled = false;
                currentState.isSpinning = false;
                renderGames();
            }, 500);
        }

        function exchangePointsToTokens() {
            if (userData.totalScore < 10) {

                return;

            const exchangeCount = Math.floor(userData.totalScore / 10);
            const earnedTokens = exchangeCount;
            userData.totalScore -= exchangeCount * 10;
            userData.tokens = (userData.tokens || 0) + earnedTokens;
            saveUserData();
            showWinNotification(`${exchangeCount * 10} ball → ${earnedTokens} tokenga almashtirildi!`);
            renderShop();
        }

            if ((userData.tokens || 0) < 50) {

            const exchangeCount = Math.floor(userData.tokens / 50);
            const earnedCoins = exchangeCount;

            userData.coins = (userData.coins || 0) + earnedCoins;
            saveUserData();
            showWinNotification(`${exchangeCount * 50} token → ${earnedCoins} tangaga almashtirildi!`);

            let questions = QUESTIONS[currentState.subject][difficulty];
            currentState.questions = [...questions];
            for(let i = currentState.questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentState.questions[i], currentState.questions[j]] = [currentState.questions[j], currentState.questions[i]];
            }
            currentState.currentQuestion = 0;
            currentState.score = 0;
            currentState.screen = 'quiz';
            currentState.isPremiumQuiz = false;
            renderHome();
        }

        function checkAnswer(selectedIdx) {
            const q = currentState.questions[currentState.currentQuestion];
            const selected = q.opts[selectedIdx];
            const isCorrect = selected === q.ans;

                showWinNotification(`❌ XATO! To'g'ri javob: ${q.ans}`);

            currentState.currentQuestion++;
            
            if(currentState.currentQuestion >= currentState.questions.length) {
                finishQuiz();
            } else {

            }
        }

        function finishQuiz() {
            const earnedPoints = currentState.score * getPointsValue(currentState.difficulty);
            const percentage = (currentState.score / currentState.questions.length) * 100;
            
            userData.totalScore += earnedPoints;
            userData.quizCount++;
            
            if(currentState.isPremiumQuiz) {
                userData.totalScore += 150;
                userData.premiumQuestions--;
                showWinNotification("⭐ PREMIUM SAVOL! +150 ball! ⭐");
            }
            
            userData.history.push({
                date: new Date().toISOString(),
                subject: currentState.subject,
                difficulty: currentState.difficulty,
                score: currentState.score,
                total: currentState.questions.length,
                percentage: percentage
            });
            
            if(percentage > userData.bestPercentage) {
                userData.bestPercentage = percentage;
            }
            
            saveUserData();
            currentState.screen = 'result';
            renderHome();
        }

        function goBack() {
            currentState.screen = 'main';
            renderHome();
        }

        function resetToMain() {
            currentState = {
                screen: 'main',
                subject: null,
                difficulty: null,
                currentQuestion: 0,
                score: 0,
                questions: [],
                isPremiumQuiz: false,
                activeTab: 'home',
                isSpinning: false
            };
            if (currentState.activeTab === 'home') renderHome();
            else if (currentState.activeTab === 'games') renderGames();
            else renderShop();
        }

        // Profil
        function openProfileModal() {
            document.getElementById('modalUserName').innerText = tgUser ? tgUser.first_name : 'User';
            document.getElementById('modalTotalScore').innerText = userData.totalScore;
            document.getElementById('modalCoins').innerText = userData.coins || 0;
            document.getElementById('modalTokens').innerText = userData.tokens || 0;
            document.getElementById('modalQuizCount').innerText = userData.quizCount;
            document.getElementById('modalBestScore').innerText = userData.bestPercentage + '%';
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
        }

        // Avatar
        document.getElementById('avatarInput')?.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    userAvatar = ev.target.result;
                    localStorage.setItem('userAvatar_neon', userAvatar);
                    updateAvatarDisplay();
                    closeProfileModal();
                    showWinNotification("Profil rasmi o'zgartirildi!");
                };
                reader.readAsDataURL(file);
            }
        });

        // Tabs
        document.getElementById('tabHome')?.addEventListener('click', () => {
            currentState.activeTab = 'home';
            document.getElementById('tabHome').classList.add('active');
            document.getElementById('tabGames').classList.remove('active');
            document.getElementById('tabShop').classList.remove('active');
            currentState.screen = 'main';
            renderHome();
        });
        
        document.getElementById('tabGames')?.addEventListener('click', () => {
            currentState.activeTab = 'games';
            document.getElementById('tabGames').classList.add('active');
            document.getElementById('tabHome').classList.remove('active');
            document.getElementById('tabShop').classList.remove('active');
            renderGames();
        });

        document.getElementById('tabShop')?.addEventListener('click', () => {
            currentState.activeTab = 'shop';
            document.getElementById('tabShop').classList.add('active');
            document.getElementById('tabHome').classList.remove('active');
            document.getElementById('tabGames').classList.remove('active');
            renderShop();
        });

        document.getElementById('profileBtn')?.addEventListener('click', openProfileModal);
        
        // Neon zarralar
        function createNeonParticles() {
            for(let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'neon-particle';
                particle.style.width = Math.random() * 10 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 300 + 'px');
                particle.style.setProperty('--ty', (Math.random() - 0.5) * 300 + 'px');
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                document.body.appendChild(particle);
            }
        }
        
        createNeonParticles();
        loadUserData();
        renderHome();
        
        // Global funksiyalarni export qilish
        window.selectSubject = selectSubject;
        window.startQuiz = startQuiz;
        window.startPremiumQuiz = startPremiumQuiz;
        window.checkAnswer = checkAnswer;
        window.goBack = goBack;
        window.resetToMain = resetToMain;
        window.openProfileModal = openProfileModal;
        window.closeProfileModal = closeProfileModal;
        window.exchangePointsToTokens = exchangePointsToTokens;
        window.exchangeTokensToCoins = exchangeTokensToCoins;
        window.buyPremiumQuestion = buyPremiumQuestion;
        window.spinWheel = spinWheel;
    </script>
</body>
</html>
