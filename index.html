<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quiz Bot | Neon Quiz Challenge</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            color: #fff;
        }

        /* Neon suzuvchi zarralar */
        .neon-particle {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: floatNeon 8s infinite ease-in-out;
        }

        @keyframes floatNeon {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0);
            }
            20% {
                opacity: 0.6;
            }
            80% {
                opacity: 0.4;
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.5);
            }
        }

        /* Neon fon chiziqlari */
        .neon-line {
            position: fixed;
            background: linear-gradient(90deg, transparent, #00ff88, #00ff88, transparent);
            height: 2px;
            width: 100%;
            top: var(--y);
            left: -100%;
            animation: slideLine 4s infinite linear;
            opacity: 0.3;
            filter: blur(2px);
        }

        @keyframes slideLine {
            to {
                left: 100%;
            }
        }

        /* Asosiy konteyner */
        .container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 3rem;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88; }
            50% { text-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88, 0 0 80px #00ff88; }
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 10px;
        }

        /* Stats panel */
        .stats-panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,255,136,0.3);
            display: flex;
            justify-content: space-between;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        .stat-label {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Subject cards */
        .subjects {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }

        .subject-card {
            background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,255,136,0.02));
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,255,136,0.2), transparent);
            transition: left 0.5s;
        }

        .subject-card:hover::before {
            left: 100%;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }

        .subject-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subject-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .subject-desc {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Difficulty buttons */
        .difficulty-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .difficulty-title {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .difficulty-buttons {
            display: flex;
            gap: 10px;
        }

        .difficulty-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .difficulty-btn.easy {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #000;
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
        }

        .difficulty-btn.medium {
            background: linear-gradient(135deg, #ffaa00, #ff8800);
            color: #000;
            box-shadow: 0 0 20px rgba(255,170,0,0.5);
        }

        .difficulty-btn.hard {
            background: linear-gradient(135deg, #ff3366, #cc0044);
            color: #fff;
            box-shadow: 0 0 20px rgba(255,51,102,0.5);
        }

        .difficulty-btn:hover {
            transform: scale(1.05);
        }

        /* Question card */
        .question-card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px 20px;
            margin-bottom: 20px;
            border: 2px solid #00ff88;
            box-shadow: 0 0 50px rgba(0,255,136,0.2);
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0,255,136,0.2); }
            50% { box-shadow: 0 0 60px rgba(0,255,136,0.4); }
        }

        .question-text {
            font-size: 1.3rem;
            line-height: 1.4;
            margin-bottom: 20px;
            text-align: center;
        }

        .question-progress {
            text-align: center;
            margin-bottom: 15px;
            color: #00ff88;
            font-size: 0.9rem;
        }

        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 1rem;
        }

        .option-btn:hover {
            background: rgba(0,255,136,0.2);
            transform: translateX(10px);
            border-color: #00ff88;
        }

        /* Result card */
        .result-card {
            text-align: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #00ff88;
        }

        .result-score {
            font-size: 3rem;
            color: #00ff88;
            text-shadow: 0 0 30px #00ff88;
            margin: 20px 0;
        }

        .result-percentage {
            font-size: 2rem;
            margin: 10px 0;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            width: 100%;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0,255,136,0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff3366, #cc0044);
            color: #fff;
        }

        /* Premium badge */
        .premium-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 100;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0a0a0a);
            border-radius: 30px;
            padding: 30px;
            max-width: 300px;
            text-align: center;
            border: 2px solid #ffd700;
        }

        .share-link {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
            word-break: break-all;
            font-size: 0.8rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            .question-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

                line.style.setProperty('--y', Math.random() * 100 + '%');
                line.style.animationDelay = Math.random() * 4 + 's';
                line.style.animationDuration = 3 + Math.random() * 3 + 's';
                document.body.appendChild(line);
            }
        }

        // Load user data
        function loadUserData() {
            const saved = localStorage.getItem('quizUserData');
            if(saved) {
                userData = JSON.parse(saved);
            }
            updateStatsDisplay();

            // Telegram user ma'lumotlarini olish
            if(tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const userId = tg.initDataUnsafe.user.id;
                // Referral kodini tekshirish
                const urlParams = new URLSearchParams(window.location.search);
                const ref = urlParams.get('ref');
                if(ref && ref !== userId.toString()) {
                    // Referral orqali kelgan
                    const referrals = JSON.parse(localStorage.getItem('referrals') || '[]');
                    if(!referrals.includes(ref)) {
                        referrals.push(ref);
                        localStorage.setItem('referrals', JSON.stringify(referrals));
                        userData.premiumQuestions = (userData.premiumQuestions || 0) + 1;
                        userData.totalScore += 5;
                        saveUserData();
                        showPremiumNotification();
                    }
                }
            }
        }

        function saveUserData() {
            localStorage.setItem('quizUserData', JSON.stringify(userData));
            updateStatsDisplay();

            // Telegram backendga yuborish
            tg.sendData(JSON.stringify({type: 'update', data: userData}));
        }

        function updateStatsDisplay() {
            document.getElementById('totalScore').innerText = userData.totalScore;
            document.getElementById('quizCount').innerText = userData.quizCount;
            document.getElementById('premiumCount').innerText = userData.premiumQuestions || 0;
        }

        function showPremiumNotification() {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: linear-gradient(135deg, #ffd700, #ffaa00);
                color: #000;
                padding: 20px;
                border-radius: 20px;
                z-index: 1000;
                text-align: center;
                animation: fadeOut 3s forwards;
            `;
            notification.innerHTML = '✨ Siz premium savol bilan taqdirlandingiz! ✨';
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // UI render functions
        function render() {
            const container = document.getElementById('mainContent');

            if(currentState.screen === 'main') {
                container.innerHTML = `
                    <div class="subjects">
                        <div class="subject-card" onclick="selectSubject('Ingliz tili')">
                            <div class="subject-icon">🇬🇧</div>
                            <div class="subject-name">Ingliz tili</div>
                            <div class="subject-desc">Grammar, Vocabulary & More</div>
                        </div>
                        <div class="subject-card" onclick="selectSubject('Matematika')">
                            <div class="subject-icon">🔢</div>
                            <div class="subject-name">Matematika</div>
                            <div class="subject-desc">Arithmetic, Algebra & Calculus</div>
                        </div>
                        <div class="subject-card" onclick="selectSubject('Koreys tili')">
                            <div class="subject-icon">🇰🇷</div>
                            <div class="subject-name">Koreys tili</div>
                            <div class="subject-desc">Korean Language & Culture</div>
                        </div>
                    </div>
                    ${(userData.premiumQuestions > 0) ? `
                        <button class="btn" onclick="startPremiumQuiz()">⭐ Premium Savol Ishlatish (${userData.premiumQuestions})</button>
                    ` : ''}
                `;
            }
            else if(currentState.screen === 'difficulty') {
                container.innerHTML = `
                    <div class="difficulty-section">
                        <div class="difficulty-title">⚡ Qiyinlik darajasini tanlang</div>
                        <div class="difficulty-buttons">
                            <button class="difficulty-btn easy" onclick="startQuiz('easy')">🟢 Easy<br><small>1 ball</small></button>
                            <button class="difficulty-btn medium" onclick="startQuiz('medium')">🟡 Medium<br><small>2 ball</small></button>
                            <button class="difficulty-btn hard" onclick="startQuiz('hard')">🔴 Hard<br><small>3 ball</small></button>
                        </div>
                        <button class="btn btn-secondary" onclick="goBack()">🔙 Ortga</button>
                    </div>
                `;
            }
            else if(currentState.screen === 'quiz') {
                const q = currentState.questions[currentState.currentQuestion];
                const progress = `${currentState.currentQuestion + 1}/${currentState.questions.length}`;
                container.innerHTML = `
                    <div class="question-card">
                        <div class="question-progress">📋 ${progress}</div>
                        <div class="question-text">${q.q}</div>
                        <div class="options">
                            ${q.opts.map((opt, idx) => `
                                <div class="option-btn" onclick="checkAnswer(${idx})">
                                    ${String.fromCharCode(65+idx)}. ${opt}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            else if(currentState.screen === 'result') {
                const percentage = (currentState.score / currentState.questions.length) * 100;
                const earnedPoints = currentState.score * getPointsValue(currentState.difficulty);
                container.innerHTML = `
                    <div class="result-card">
                        <div class="logo">🎉</div>
                        <h2>Test Yakunlandi!</h2>
                        <div class="result-score">${currentState.score}/${currentState.questions.length}</div>
                        <div class="result-percentage">${percentage.toFixed(1)}%</div>
                        <div>⭐ To'plangan ball: ${earnedPoints}</div>
                        <button class="btn" onclick="resetToMain()">🔄 Yangi Test</button>
                        <button class="btn btn-secondary" onclick="shareResult()">📤 Natijani Ulashish</button>
                    </div>
                `;
            }
        }

        function getPointsValue(difficulty) {
            const points = {easy: 1, medium: 2, hard: 3};
            return points[difficulty] || 1;
        }

        function selectSubject(subject) {
            currentState.subject = subject;
            currentState.screen = 'difficulty';
            render();
        }

        function startQuiz(difficulty) {
            currentState.difficulty = difficulty;
            const questions = QUESTIONS[currentState.subject][difficulty];
            currentState.questions = [...questions];
            // Randomize question order
            for(let i = currentState.questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentState.questions[i], currentState.questions[j]] = [currentState.questions[j], currentState.questions[i]];
            }
            currentState.currentQuestion = 0;
            currentState.score = 0;
            currentState.screen = 'quiz';
            currentState.isPremiumQuiz = false;
            render();
        }

        function startPremiumQuiz() {
            if(userData.premiumQuestions <= 0) {
                alert("Premium savollaringiz yo'q! Do'stingizni taklif qiling.");
                return;
            }

            const randomPremium = PREMIUM_QUESTIONS[Math.floor(Math.random() * PREMIUM_QUESTIONS.length)];
            currentState.questions = [randomPremium];
            currentState.currentQuestion = 0;
            currentState.score = 0;
            currentState.screen = 'quiz';
            currentState.isPremiumQuiz = true;
            render();
        }

        function checkAnswer(selectedIdx) {
            const q = currentState.questions[currentState.currentQuestion];
            const selected = q.opts[selectedIdx];
            const isCorrect = selected === q.ans;

            if(isCorrect) {
                currentState.score++;
                showFeedback(true);
            } else {
                showFeedback(false, q.ans);
            }

            currentState.currentQuestion++;

            if(currentState.currentQuestion >= currentState.questions.length) {
                finishQuiz();
            } else {
                render();
            }
        }

        function showFeedback(isCorrect, correctAnswer = '') {
            const feedback = document.createElement('div');
            feedback.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: ${isCorrect ? 'rgba(0,255,136,0.9)' : 'rgba(255,51,102,0.9)'};
                color: ${isCorrect ? '#000' : '#fff'};
                padding: 20px 40px;
                border-radius: 50px;
                font-size: 1.5rem;
                font-weight: bold;
                z-index: 1000;
                animation: fadeOut 1.5s forwards;
                text-align: center;
            `;
            feedback.innerHTML = isCorrect ? '✅ TO\'G\'RI!' : `❌ XATO!<br>To\'g\'ri javob: ${correctAnswer}`;
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 1500);
        }

        function finishQuiz() {
            const earnedPoints = currentState.score * getPointsValue(currentState.difficulty);
            userData.totalScore += earnedPoints;
            userData.quizCount++;

            if(currentState.isPremiumQuiz) {
                userData.premiumQuestions--;
            }

            saveUserData();
            currentState.screen = 'result';
            render();
        }

        function goBack() {
            currentState.screen = 'main';
            render();
        }

        function resetToMain() {
            currentState = {
                screen: 'main',
                subject: null,
                difficulty: null,
                currentQuestion: 0,
                score: 0,
                questions: [],
                isPremiumQuiz: false
            };
            render();
        }

        function shareResult() {
            const percentage = (currentState.score / currentState.questions.length) * 100;
            const text = `🎉 Men NEON QUIZ da ${percentage.toFixed(0)}% natija ko'rsatdim! Sen ham sinab ko'r!`;
            tg.showAlert(text);

            // Link yaratish
            const botUsername = tg.initDataUnsafe?.user?.username || 'QuizBot';
            const link = `https://t.me/${botUsername}?start=ref_${tg.initDataUnsafe?.user?.id}`;

            const modal = document.getElementById('modal');
            document.getElementById('shareLink').innerText = link;
            modal.style.display = 'flex';
        }

        function copyLink() {
            const link = document.getElementById('shareLink').innerText;
            navigator.clipboard.writeText(link);
            tg.showAlert('Link nusxalandi!');
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        document.getElementById('premiumBadge').onclick = () => {
            const link = `https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=NEON QUIZ ga qo\'shiling!`;
            window.open(link, '_blank');
        };

        // Add animation style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                70% { opacity: 1; }
                100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
            }
        `;
        document.head.appendChild(style);

        // Initialize
        createNeonParticles();
        createNeonLines();
        loadUserData();
        render();
    </script>
</body>
</html>
