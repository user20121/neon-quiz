<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NEON QUIZ | O'zbek tilidagi testlar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            overflow-x: hidden;
            color: #fff;
        }

        .neon-particle {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: floatNeon 8s infinite ease-in-out;
            background: radial-gradient(circle, #ff6b6b, #4ecdc4, #45b7d1);
            border-radius: 50%;
        }

        @keyframes floatNeon {
            0% { opacity: 0; transform: translate(0, 0) scale(0); }
            20% { opacity: 0.5; }
            80% { opacity: 0.3; }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.5); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 15px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .profile-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .profile-avatar:hover { transform: scale(1.05); }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-weight: bold; font-size: 0.9rem; }
        .profile-name small { font-size: 0.7rem; opacity: 0.7; }

        .currency-panel {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 8px 15px;
        }
        .currency-item { display: flex; align-items: center; gap: 6px; font-size: 1rem; font-weight: bold; }
        .balance { color: #4ecdc4; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 80px;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            box-shadow: 0 0 20px rgba(78,205,196,0.5);
        }

        .stats-panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(78,205,196,0.3);
            display: flex;
            justify-content: space-between;
        }
        .stat-item { text-align: center; flex: 1; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #4ecdc4; text-shadow: 0 0 10px #4ecdc4; }
        .stat-label { font-size: 0.7rem; opacity: 0.7; }

        .subjects {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }
        .subject-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(78,205,196,0.3);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .subject-card:hover {
            transform: translateY(-5px);
            border-color: #4ecdc4;
            box-shadow: 0 0 30px rgba(78,205,196,0.3);
        }
        .subject-icon { font-size: 3rem; margin-bottom: 10px; }
        .subject-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .subject-desc { font-size: 0.8rem; opacity: 0.7; }

        .difficulty-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .difficulty-title { text-align: center; margin-bottom: 15px; font-size: 1.2rem; }
        .difficulty-buttons { display: flex; gap: 10px; }
        .difficulty-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .difficulty-btn.easy { background: linear-gradient(135deg, #00ff88, #00cc66); color: #000; }
        .difficulty-btn.medium { background: linear-gradient(135deg, #ffaa00, #ff8800); color: #000; }
        .difficulty-btn.hard { background: linear-gradient(135deg, #ff3366, #cc0044); color: #fff; }
        .difficulty-btn:hover { transform: scale(1.05); }

        .question-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px 20px;
            margin-bottom: 20px;
            border: 2px solid #4ecdc4;
            box-shadow: 0 0 50px rgba(78,205,196,0.2);
        }
        .question-text { font-size: 1.3rem; line-height: 1.4; margin-bottom: 20px; text-align: center; }
        .question-progress { text-align: center; margin-bottom: 15px; color: #4ecdc4; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(78,205,196,0.3);
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option-btn:hover { background: rgba(78,205,196,0.2); transform: translateX(10px); }

        .result-card {
            text-align: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #4ecdc4;
        }
        .result-score { font-size: 3rem; color: #4ecdc4; text-shadow: 0 0 30px #4ecdc4; margin: 20px 0; }
        .result-percentage { font-size: 2rem; margin: 10px 0; }

        .shop-container, .tasks-container, .search-container {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .shop-category {
            margin-bottom: 25px;
        }
        .shop-category-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #4ecdc4;
            display: inline-block;
        }
        .shop-item, .task-item {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 12px 15px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .shop-item:hover, .task-item:hover {
            background: rgba(78,205,196,0.2);
            transform: translateX(5px);
        }
        .shop-item-info h4, .task-item-info h4 {
            font-size: 1rem;
            margin-bottom: 5px;
        }
        .shop-item-info p, .task-item-info p {
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .shop-item-price {
            text-align: right;
        }
        .price-current {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffd700;
        }
        .btn-shop, .task-btn {
            background: linear-gradient(135deg, #4ecdc4, #45b7d1);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-shop:hover, .task-btn:hover { transform: scale(1.05); }
        .task-btn.completed {
            background: #00ff88;
            color: #000;
            opacity: 0.7;
            cursor: default;
        }
        .task-btn.completed:hover { transform: none; }

        .exchange-section {
            background: rgba(78,205,196,0.1);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .exchange-buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        .exchange-btn {
            flex: 1;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }

        .search-box {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(78,205,196,0.3);
            border-radius: 30px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        .search-input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 10px rgba(78,205,196,0.3);
        }
        .user-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .user-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 12px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .user-card:hover {
            background: rgba(78,205,196,0.2);
            transform: translateX(5px);
        }
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-info {
            flex: 1;
        }
        .user-name {
            font-weight: bold;
        }
        .user-username {
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .user-vip {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: bold;
            margin-left: 8px;
        }
        .user-stats {
            font-size: 0.7rem;
            text-align: right;
        }

        .btn {
            background: linear-gradient(135deg, #4ecdc4, #45b7d1);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            width: 100%;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(78,205,196,0.5); }
        .btn-secondary { background: linear-gradient(135deg, #ff6b6b, #ff4757); }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0f0c29);
            border-radius: 30px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            border: 2px solid #4ecdc4;

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 15px;
            overflow: hidden;
            cursor: pointer;
        }
        .profile-stats {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .file-input { display: none; }
        .form-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(78,205,196,0.3);
            border-radius: 15px;
            color: #fff;
            outline: none;
        }

        .intro-text {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
        }

        .channel-card {
            background: linear-gradient(135deg, #0088cc, #0055aa);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;

            margin-bottom: 10px;
        }
        .channel-btn {
            background: #fff;
            color: #0088cc;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
        }

        .win-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            z-index: 2000;
            animation: winPulse 0.5s ease-in-out 3;
            text-align: center;
            white-space: nowrap;
        }
        @keyframes winPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }
    </style>
</head>

        // Boost va VIP tekshirish
        function updateActiveBoost() {
            const now = Date.now() / 1000;
            let activeMultiplier = 1;
            
            userData.activeBoosts = (userData.activeBoosts || []).filter(boost => boost.endTime > now);
            
            for (const boost of (userData.activeBoosts || [])) {
                if (boost.multiplier && boost.multiplier > activeMultiplier) {
                    activeMultiplier = boost.multiplier;
                }
            }
            
            let vipActive = false;
            if (userData.vip && userData.vip.endTime > now) {
                vipActive = true;
            } else if (isVIP()) {
                vipActive = true;
            }
            
            currentState.currentBoostMultiplier = activeMultiplier;
            currentState.vipActive = vipActive;
            document.getElementById('boostMultiplier').innerText = activeMultiplier + 'x';
            
            saveUserData();
        }

            if (!userData.activeBoosts) userData.activeBoosts = [];

            if(savedUsers) {

        function exchangePointsToTokens() {
            if (getScoreBalance() < 10) {
                showNotification("Kamida 10 ball kerak!", false);
                return;
            }
            const exchangeCount = Math.floor(getScoreBalance() / 10);
            const earnedTokens = exchangeCount;
            if (!isVIP()) {
                userData.totalScore -= exchangeCount * 10;
                userData.tokens = (userData.tokens || 0) + earnedTokens;
            }
            saveUserData();
            showNotification(`${exchangeCount * 10} ball → ${earnedTokens} tokenga almashtirildi!`);
            if (currentState.activeTab === 'shop') renderShop();
        }

        function exchangeTokensToPoints() {
            if (getTokenBalance() < 5) {
                showNotification("Kamida 5 token kerak!", false);
                return;
            }
            const exchangeCount = Math.floor(getTokenBalance() / 5);
            const earnedPoints = exchangeCount * 10;
            if (!isVIP()) {
                userData.tokens -= exchangeCount * 5;
                userData.totalScore += earnedPoints;
            }
            saveUserData();
            showNotification(`${exchangeCount * 5} token → ${earnedPoints} ballga almashtirildi!`);
            if (currentState.activeTab === 'shop') renderShop();
        }

        // ==================== DO'KON FUNKSIYALARI ====================
        function buyItem(item, category) {
            let price = getDiscountedPrice(item.price);
            
            if (getTokenBalance() < price) {
                showNotification(`Token yetarli emas! ${price} token kerak.`, false);
                return;
            }
            
            if (!spendTokens(price)) return;
            
            if (category === 'boosts') {
                if (item.multiplier) {
                    const endTime = (Date.now() / 1000) + item.duration;
                    userData.activeBoosts.push({
                        type: item.id,
                        multiplier: item.multiplier,
                        endTime: endTime
                    });
                    showNotification(`${item.name} faollashtirildi! ${item.multiplier}x ball!`);
                    updateActiveBoost();
                } else if (item.type === 'help') {
                    showNotification(`${item.name} sotib olindi! Keyingi savolda ishlatishingiz mumkin.`);
                } else if (item.type === 'skip') {
                    showNotification(`${item.name} sotib olindi! Keyingi savolda o'tkazib yuborishingiz mumkin.`);
                } else if (item.type === 'time') {
                    showNotification(`${item.name} sotib olindi! Qo'shimcha vaqt qo'shildi.`);
                }
            } 
            else if (category === 'quiz_powers') {
                if (item.reward && item.reward.premium) {
                    userData.premiumQuestions = (userData.premiumQuestions || 0) + item.reward.premium;
                    showNotification(`${item.reward.premium} ta premium savol qo'shildi!`);
                }
                if (item.type === 'hard_unlock') {
                    userData.hardUnlocked = true;
                    showNotification("Qiyin rejim ochildi!");
                }
            }
            else if (category === 'vip') {
                const endTime = (Date.now() / 1000) + item.duration;
                userData.vip = {
                    endTime: endTime,
                    benefits: item.benefits
                };
                showNotification(`${item.name} sotib olindi! VIP imtiyozlari faollashtirildi!`);
                updateActiveBoost();
            }
            
            saveUserData();
            if (currentState.activeTab === 'shop') renderShop();
        }

        function buyShopItem(itemId, category) {
            let item = null;
            if (category === 'boosts') item = SHOP_ITEMS.boosts.find(i => i.id === itemId);
            else if (category === 'quiz_powers') item = SHOP_ITEMS.quiz_powers.find(i => i.id === itemId);
            else if (category === 'vip') item = SHOP_ITEMS.vip.find(i => i.id === itemId);
            
            if (item) buyItem(item, category);
        }

        function getPointsValue(difficulty) {
            const points = {easy: 1, medium: 2, hard: 3};
            return points[difficulty] || 1;
        }

        function selectSubject(subject) {
            currentState.subject = subject;
            currentState.screen = 'difficulty';
            renderHome();
        }

        function startQuiz(difficulty) {
            currentState.difficulty = difficulty;
            let questions = QUESTIONS[currentState.subject][difficulty];
            currentState.questions = [...questions];
            for(let i = currentState.questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentState.questions[i], currentState.questions[j]] = [currentState.questions[j], currentState.questions[i]];
            }
            currentState.currentQuestion = 0;
            currentState.score = 0;
            currentState.screen = 'quiz';
            currentState.isPremiumQuiz = false;
            renderHome();
        }

        function startPremiumQuiz() {
            if(userData.premiumQuestions <= 0 && !isVIP()) {
                showNotification("Premium savollaringiz yo'q!", false);
                return;
            }
            const randomPremium = PREMIUM_QUESTIONS[Math.floor(Math.random() * PREMIUM_QUESTIONS.length)];
            currentState.questions = [randomPremium];
            currentState.currentQuestion = 0;
            currentState.score = 0;
            currentState.screen = 'quiz';
            currentState.isPremiumQuiz = true;
            renderHome();
        }

        function checkAnswer(selectedIdx) {
            const q = currentState.questions[currentState.currentQuestion];
            const selected = q.opts[selectedIdx];
            const isCorrect = selected === q.ans;
            
            if(isCorrect) {
                currentState.score++;
                showNotification("✅ TO'G'RI!");
            } else {
                showNotification(`❌ XATO! To'g'ri javob: ${q.ans}`, false);
            }
            
            currentState.currentQuestion++;
            
            if(currentState.currentQuestion >= currentState.questions.length) {
                finishQuiz();
            } else {
                renderHome();
            }
        }

        function finishQuiz() {
            let earnedPoints = currentState.score * getPointsValue(currentState.difficulty);
            earnedPoints = Math.floor(earnedPoints * currentState.currentBoostMultiplier);
            if (currentState.vipActive) earnedPoints = Math.floor(earnedPoints * 2);
            
            const percentage = (currentState.score / currentState.questions.length) * 100;
            
            if (!isVIP()) {
                userData.totalScore += earnedPoints;
            }
            userData.quizCount++;
            
            if(currentState.isPremiumQuiz && !isVIP()) {
                userData.totalScore += 150;
                userData.premiumQuestions--;
                showNotification("⭐ PREMIUM SAVOL! +150 ball! ⭐");
            }
            
            userData.history.push({
                date: new Date().toISOString(),
                subject: currentState.subject,
                difficulty: currentState.difficulty,
                score: currentState.score,
                total: currentState.questions.length,
                percentage: percentage
            });
            
            if(percentage > userData.bestPercentage) {
                userData.bestPercentage = percentage;
            }
            
            saveUserData();
            currentState.screen = 'result';
            renderHome();
        }

        function goBack() {
            currentState.screen = 'main';
            renderHome();
        }

        function resetToMain() {
            currentState = {
                screen: 'main',
                subject: null,
                difficulty: null,
                currentQuestion: 0,

                isPremiumQuiz: false,
                activeTab: currentState.activeTab,
                currentBoostMultiplier: currentState.currentBoostMultiplier,
                vipActive: currentState.vipActive

            updateActiveBoost();
            if (currentState.activeTab === 'home') renderHome();
            else if (currentState.activeTab === 'tasks') renderTasks();
            else if (currentState.activeTab === 'shop') renderShop();
            else if (currentState.activeTab === 'search') renderSearch();
        }

            document.getElementById('tabShop').classList.add('active');
            document.getElementById('tabHome').classList.remove('active');
            document.getElementById('tabTasks').classList.remove('active');
            document.getElementById('tabSearch').classList.remove('active');
            renderShop();
        });

        document.getElementById('tabSearch')?.addEventListener('click', () => {
            currentState.activeTab = 'search';
            document.getElementById('tabSearch').classList.add('active');
            document.getElementById('tabHome').classList.remove('active');
            document.getElementById('tabTasks').classList.remove('active');
            document.getElementById('tabShop').classList.remove('active');
            renderSearch();
        });

        document.getElementById('profileBtn')?.addEventListener('click', openProfileModal);
        
        // Har qanday qurilmada ekranga to'lib ochilishi
        window.addEventListener('load', () => {
            tg.expand();
            document.body.style.height = window.innerHeight + 'px';
        });
        
        window.addEventListener('resize', () => {
            tg.expand();
            document.body.style.height = window.innerHeight + 'px';
        });
        
        // Neon zarralar
        function createNeonParticles() {
            for(let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'neon-particle';
                particle.style.width = Math.random() * 10 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 300 + 'px');
                particle.style.setProperty('--ty', (Math.random() - 0.5) * 300 + 'px');
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                document.body.appendChild(particle);
            }
        }
        
        createNeonParticles();
        loadUserData();
        renderHome();
        
        // Global funksiyalar
        window.selectSubject = selectSubject;
        window.startQuiz = startQuiz;
        window.startPremiumQuiz = startPremiumQuiz;
        window.checkAnswer = checkAnswer;
        window.goBack = goBack;
        window.resetToMain = resetToMain;
        window.getPointsValue = getPointsValue;
        window.buyShopItem = buyShopItem;
        window.exchangePointsToTokens = exchangePointsToTokens;
        window.exchangeTokensToPoints = exchangeTokensToPoints;
        window.checkChannelSubscription = checkChannelSubscription;
        window.changeUsername = changeUsername;
        window.searchUsers = searchUsers;
        window.viewUserProfile = viewUserProfile;
        window.registerUser = registerUser;
        window.showNotification = showNotification;
    </script>
</body>
</html>
