<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NEON QUIZ | O'zbek tilidagi testlar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            overflow-x: hidden;
            color: #fff;
        }

        .neon-particle {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: floatNeon 8s infinite ease-in-out;
            background: radial-gradient(circle, #ff6b6b, #4ecdc4, #45b7d1);
            border-radius: 50%;
        }

        @keyframes floatNeon {
            0% { opacity: 0; transform: translate(0, 0) scale(0); }
            20% { opacity: 0.5; }
            80% { opacity: 0.3; }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.5); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 15px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .profile-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .profile-avatar:hover { transform: scale(1.05); }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-weight: bold; font-size: 0.9rem; }
        .profile-name small { font-size: 0.7rem; opacity: 0.7; }

        .currency-panel {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 8px 15px;
        }
        .currency-item { display: flex; align-items: center; gap: 6px; font-size: 1rem; font-weight: bold; }
        .balance { color: #4ecdc4; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            box-shadow: 0 0 20px rgba(78,205,196,0.5);
        }

        .stats-panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(78,205,196,0.3);
            display: flex;
            justify-content: space-between;
        }
        .stat-item { text-align: center; flex: 1; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #4ecdc4; text-shadow: 0 0 10px #4ecdc4; }
        .stat-label { font-size: 0.7rem; opacity: 0.7; }

        .subjects {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }
        .subject-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(78,205,196,0.3);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .subject-card:hover {
            transform: translateY(-5px);
            border-color: #4ecdc4;
            box-shadow: 0 0 30px rgba(78,205,196,0.3);
        }
        .subject-icon { font-size: 3rem; margin-bottom: 10px; }
        .subject-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .subject-desc { font-size: 0.8rem; opacity: 0.7; }

        .difficulty-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .difficulty-title { text-align: center; margin-bottom: 15px; font-size: 1.2rem; }
        .difficulty-buttons { display: flex; gap: 10px; }
        .difficulty-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .difficulty-btn.easy { background: linear-gradient(135deg, #00ff88, #00cc66); color: #000; }
        .difficulty-btn.medium { background: linear-gradient(135deg, #ffaa00, #ff8800); color: #000; }
        .difficulty-btn.hard { background: linear-gradient(135deg, #ff3366, #cc0044); color: #fff; }
        .difficulty-btn:hover { transform: scale(1.05); }

        .question-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px 20px;
            margin-bottom: 20px;
            border: 2px solid #4ecdc4;
            box-shadow: 0 0 50px rgba(78,205,196,0.2);
        }
        .question-text { font-size: 1.3rem; line-height: 1.4; margin-bottom: 20px; text-align: center; }
        .question-progress { text-align: center; margin-bottom: 15px; color: #4ecdc4; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(78,205,196,0.3);
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option-btn:hover { background: rgba(78,205,196,0.2); transform: translateX(10px); }

        .result-card {
            text-align: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #4ecdc4;
        }
        .result-score { font-size: 3rem; color: #4ecdc4; text-shadow: 0 0 30px #4ecdc4; margin: 20px 0; }
        .result-percentage { font-size: 2rem; margin: 10px 0; }

        .wheel-container {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .shop-category {
            margin-bottom: 25px;
        }
        .shop-category-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #4ecdc4;
            display: inline-block;
        }
        .shop-item {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 12px 15px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .shop-item:hover {
            background: rgba(78,205,196,0.2);
            transform: translateX(5px);
        }
        .shop-item-info h4 {
            font-size: 1rem;
            margin-bottom: 5px;
        }
        .shop-item-info p {
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .shop-item-price {
            text-align: right;
        }
        .price-original {
            font-size: 0.7rem;
            text-decoration: line-through;
            opacity: 0.5;
        }
        .price-current {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffd700;
        }
        .discount-badge {
            background: #ff3366;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
        .btn-shop {
            background: linear-gradient(135deg, #4ecdc4, #45b7d1);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-shop:hover { transform: scale(1.05); }
        .btn-shop:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .vip-badge {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 8px;
        }

        .wheel-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }
        .wheel {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.2, 0.9, 0.1, 1.1);
            box-shadow: 0 0 30px rgba(78,205,196,0.5);
        }
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            left: 50%;
            top: 50%;
            transform-origin: 0% 0%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            padding: 5px;
            color: #fff;
            text-shadow: 0 0 3px #000;
        }
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border-radius: 50%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .wheel-pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #ff6b6b;
            z-index: 15;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }
        .spin-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .spin-info {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #4ecdc4, #45b7d1);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            width: 100%;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(78,205,196,0.5); }
        .btn-secondary { background: linear-gradient(135deg, #ff6b6b, #ff4757); }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0f0c29);
            border-radius: 30px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            border: 2px solid #4ecdc4;
        }
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 15px;
            overflow: hidden;
            cursor: pointer;
        }
        .profile-stats {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .file-input { display: none; }

        .win-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            z-index: 2000;
            animation: winPulse 0.5s ease-in-out 3;
            text-align: center;
            white-space: nowrap;
        }
        @keyframes winPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }

        .boost-active {
            background: rgba(0,255,136,0.2);
            border: 1px solid #00ff88;
        }
    </style>
</head>

        function getRandomReward(type) {
            let rewards = [];
            if (type === 'mystery') rewards = MYSTERY_REWARDS;
            else if (type === 'lucky') {
                rewards = MYSTERY_REWARDS.map(r => ({ ...r, chance: r.chance * 1.5 }));
            } else if (type === 'random') {
                return { name: "Random Paket", tokens: Math.floor(Math.random() * 100) + 20 };
            }
            
            const totalChance = rewards.reduce((sum, r) => sum + r.chance, 0);
            let random = Math.random() * totalChance;
            let current = 0;
            for (const reward of rewards) {
                current += reward.chance;
                if (random <= current) {
                    return reward;
                }
            }
            return rewards[0];
        }

        // ==================== BARABAN FUNKSIYALARI ====================
        function createWheelSegments(items) {
            const totalChance = items.reduce((sum, item) => sum + item.chance, 0);
            let currentAngle = 0;
            const segments = [];
            
            items.forEach((item) => {
                const angle = (item.chance / totalChance) * 360;
                segments.push({
                    name: item.name,
                    angle: angle,
                    color: item.color,
                    reward: item.reward,
                    startAngle: currentAngle,
                    endAngle: currentAngle + angle
                });
                currentAngle += angle;
            });
            return segments;
        }

        function getRewardAtAngle(segments, angle) {
            for (const segment of segments) {
                if (angle >= segment.startAngle && angle < segment.endAngle) {
                    return segment;
                }
            }
            return segments[0];
        }

        async function spinWheel(wheelType) {
            if (currentState.isSpinning) {
                showNotification("Baraban aylanmoqda, kuting!", false);
                return;
            }
            
            let items, cost = 0, isFree = false;
            
            if (wheelType === 'free') {
                if (userData.lastFreeSpin) {
                    const lastSpin = new Date(userData.lastFreeSpin);
                    const today = new Date();
                    if (lastSpin.toDateString() === today.toDateString()) {
                        showNotification("Bugun bepul spinningizni ishlatgansiz! Ertaga qaytib keling.", false);
                        return;
                    }
                }
                items = FREE_WHEEL_ITEMS;
                isFree = true;
            } else {
                if ((userData.tokens || 0) < 200) {
                    showNotification("Token yetarli emas! 200 token kerak.", false);
                    return;
                }
                items = TOKEN_WHEEL_ITEMS;
                cost = 200;
            }
            
            currentState.isSpinning = true;
            
            const segments = createWheelSegments(items);
            const wheelElement = document.getElementById('activeWheel');
            const spinBtn = document.getElementById('spinBtnActive');
            
            if (!wheelElement) {
                currentState.isSpinning = false;
                return;
            }
            
            if (spinBtn) spinBtn.disabled = true;
            
            wheelElement.style.transition = 'none';
            wheelElement.style.transform = 'rotate(0deg)';
            wheelElement.offsetHeight;
            
            const spins = 8 + Math.random() * 4;
            const finalAngle = 360 * spins + Math.random() * 360;
            
            wheelElement.style.transition = 'transform 4s cubic-bezier(0.2, 0.9, 0.1, 1.1)';
            wheelElement.style.transform = `rotate(${finalAngle}deg)`;
            
            await new Promise(resolve => setTimeout(resolve, 4000));
            
            const actualAngle = finalAngle % 360;
            const selectedSegment = getRewardAtAngle(segments, actualAngle);
            
            if (isFree) {
                userData.lastFreeSpin = new Date().toISOString();
            } else {
                userData.tokens -= cost;
            }
            
            let winText = "";
            if (selectedSegment.reward.tokens) {
                userData.tokens = (userData.tokens || 0) + selectedSegment.reward.tokens;
                winText = `${selectedSegment.reward.tokens} Token yutdingiz!`;
            }
            if (selectedSegment.reward.points) {
                userData.totalScore += selectedSegment.reward.points;
                winText = `${selectedSegment.reward.points} Ball yutdingiz!`;
            }
            if (selectedSegment.reward.premium) {
                userData.premiumQuestions = (userData.premiumQuestions || 0) + selectedSegment.reward.premium;
                winText = `Premium savol yutdingiz!`;
            }
            
            saveUserData();
            showNotification(winText);
            
            setTimeout(() => {
                if (spinBtn) spinBtn.disabled = false;
                currentState.isSpinning = false;
                renderGames();
            }, 500);
        }

                        <div class="difficulty-buttons">
                            <button class="difficulty-btn easy" onclick="window.startQuiz('easy')">🟢 Oson<br><small>1 ball</small></button>
                            <button class="difficulty-btn medium" onclick="window.startQuiz('medium')">🟡 O'rta<br><small>2 ball</small></button>
                            ${userData.hardUnlocked ? `<button class="difficulty-btn hard" onclick="window.startQuiz('hard')">🔴 Qiyin<br><small>3 ball</small></button>` : `<button class="difficulty-btn hard" style="opacity:0.5" disabled>🔴 Qiyin (Do'kondan oching)</button>`}
                        </div>
                        <button class="btn btn-secondary" onclick="window.goBack()">🔙 Ortga</button>
                    </div>
                `;
            } else if (currentState.screen === 'quiz') {
                const q = currentState.questions[currentState.currentQuestion];
                const progress = `${currentState.currentQuestion + 1}/${currentState.questions.length}`;
                container.innerHTML = `
                    <div class="question-card">
                        <div class="question-progress">📋 ${progress}</div>
                        <div class="question-text">${q.q}</div>
                        <div class="options">
                            ${q.opts.map((opt, idx) => `<div class="option-btn" onclick="window.checkAnswer(${idx})">${String.fromCharCode(65+idx)}. ${opt}</div>`).join('')}
                        </div>
                    </div>
                `;
            } else if (currentState.screen === 'result') {
                const percentage = (currentState.score / currentState.questions.length) * 100;
                let earnedPoints = currentState.score * window.getPointsValue(currentState.difficulty);
                earnedPoints = Math.floor(earnedPoints * currentState.currentBoostMultiplier);
                if (currentState.vipActive) earnedPoints = Math.floor(earnedPoints * 2);
                
                container.innerHTML = `
                    <div class="result-card">
                        <div class="logo">🎉</div>
                        <h2>Test Yakunlandi!</h2>
                        <div class="result-score">${currentState.score}/${currentState.questions.length}</div>
                        <div class="result-percentage">${percentage.toFixed(1)}%</div>
                        <div>⭐ To'plangan ball: ${earnedPoints} ${currentState.currentBoostMultiplier > 1 ? `(x${currentState.currentBoostMultiplier} boost)` : ''}</div>
                        <button class="btn" onclick="window.resetToMain()">🔄 Yangi Test</button>
                    </div>
                `;
            }
        }

        function renderGames() {
            const container = clearMainContent();
            const canFreeSpin = !userData.lastFreeSpin || new Date(userData.lastFreeSpin).toDateString() !== new Date().toDateString();
            
            const freeSegments = createWheelSegments(FREE_WHEEL_ITEMS);
            const tokenSegments = createWheelSegments(TOKEN_WHEEL_ITEMS);
            
            let freeSegmentsHtml = '', tokenSegmentsHtml = '';
            let freeAngle = 0, tokenAngle = 0;
            
            freeSegments.forEach(seg => {
                freeSegmentsHtml += `<div class="wheel-segment" style="transform: rotate(${freeAngle}deg); background: ${seg.color}; width: 50%; height: 50%; left: 50%; top: 50%; transform-origin: 0% 0%; clip-path: polygon(0% 0%, 100% 0%, 50% 100%);"><span style="transform: rotate(45deg); display: inline-block; font-size: 10px;">${seg.name}</span></div>`;
                freeAngle += seg.angle;
            });
            
            tokenSegments.forEach(seg => {
                tokenSegmentsHtml += `<div class="wheel-segment" style="transform: rotate(${tokenAngle}deg); background: ${seg.color}; width: 50%; height: 50%; left: 50%; top: 50%; transform-origin: 0% 0%; clip-path: polygon(0% 0%, 100% 0%, 50% 100%);"><span style="transform: rotate(45deg); display: inline-block; font-size: 10px;">${seg.name}</span></div>`;
                tokenAngle += seg.angle;
            });
            
            container.innerHTML = `
                <div class="wheel-container">
                    <h3>🎁 Kunlik Bepul Spin</h3>
                    <div class="wheel-wrapper">
                        <div class="wheel-pointer"></div>
                        <div class="wheel" id="freeWheel">
                            <div style="position: relative; width: 100%; height: 100%; border-radius: 50%; overflow: hidden;">
                                ${freeSegmentsHtml}
                            </div>
                        </div>
                        <div class="wheel-center">🎲</div>
                    </div>
                    <button class="spin-btn" id="freeSpinBtn" ${!canFreeSpin ? 'disabled' : ''}>${canFreeSpin ? '🎰 BEPUL SPIN' : '⏰ ERTAGA KELING'}</button>
                    <div class="spin-info">⚡ Har kuni 1 marta bepul!</div>
                </div>
                
                <div class="wheel-container">
                    <h3>💎 Token Spin (200 token)</h3>
                    <div class="wheel-wrapper">
                        <div class="wheel-pointer"></div>
                        <div class="wheel" id="tokenWheel">
                            <div style="position: relative; width: 100%; height: 100%; border-radius: 50%; overflow: hidden;">
                                ${tokenSegmentsHtml}
                            </div>
                        </div>
                        <div class="wheel-center">🎰</div>
                    </div>
                    <button class="spin-btn" id="tokenSpinBtn">🎰 TOKEN SPIN (200)</button>
                    <div class="spin-info">💰 Tokenlar: ${userData.tokens || 0}</div>
                </div>
            `;
            
            const freeBtn = document.getElementById('freeSpinBtn');
            const tokenBtn = document.getElementById('tokenSpinBtn');
            const freeWheel = document.getElementById('freeWheel');
            const tokenWheel = document.getElementById('tokenWheel');
            
            if (freeBtn) {
                freeBtn.onclick = () => {
                    window.currentWheel = freeWheel;
                    spinWheel('free');
                };
            }
            if (tokenBtn) {
                tokenBtn.onclick = () => {
                    if ((userData.tokens || 0) >= 200) {
                        window.currentWheel = tokenWheel;
                        spinWheel('token');
                    } else {
                        showNotification("Token yetarli emas! 200 token kerak.", false);
                    }
                };
            }
        }

        function renderShop() {
            const container = clearMainContent();
            const discountActive = isDiscountDay();
            const discountText = discountActive ? ' 🔥 PAYSHANBA CHEGIRMA 20%!' : '';
            
            let boostsHtml = '', quizHtml = '', vipHtml = '', specialHtml = '';
            
            SHOP_ITEMS.boosts.forEach(item => {
                const price = getDiscountedPrice(item.price);
                const originalPrice = item.price;
                boostsHtml += `
                    <div class="shop-item">
                        <div class="shop-item-info">
                            <h4>⚡ ${item.name}</h4>
                            <p>${item.desc}</p>
                        </div>
                        <div class="shop-item-price">
                            ${discountActive && originalPrice !== price ? `<div class="price-original">${originalPrice} 🎫</div>` : ''}
                            <div class="price-current">${price} 🎫</div>
                            <button class="btn-shop" onclick="window.buyShopItem('${item.id}', 'boosts')">Sotib olish</button>
                        </div>
                    </div>
                `;
            });
            
            SHOP_ITEMS.quiz_powers.forEach(item => {
                const price = getDiscountedPrice(item.price);
                const originalPrice = item.price;
                quizHtml += `
                    <div class="shop-item">
                        <div class="shop-item-info">
                            <h4>🎓 ${item.name}</h4>
                            <p>${item.desc}</p>
                        </div>
                        <div class="shop-item-price">
                            ${discountActive && originalPrice !== price ? `<div class="price-original">${originalPrice} 🎫</div>` : ''}
                            <div class="price-current">${price} 🎫</div>
                            <button class="btn-shop" onclick="window.buyShopItem('${item.id}', 'quiz_powers')">Sotib olish</button>
                        </div>
                    </div>
                `;
            });
            
            SHOP_ITEMS.vip.forEach(item => {
                const price = getDiscountedPrice(item.price);
                const originalPrice = item.price;
                vipHtml += `
                    <div class="shop-item">
                        <div class="shop-item-info">
                            <h4>👑 ${item.name}</h4>
                            <p>${item.desc}</p>
                        </div>
                        <div class="shop-item-price">
                            ${discountActive && originalPrice !== price ? `<div class="price-original">${originalPrice} 🎫</div>` : ''}
                            <div class="price-current">${price} 🎫</div>
                            <button class="btn-shop" onclick="window.buyShopItem('${item.id}', 'vip')">Sotib olish</button>
                        </div>
                    </div>
                `;
            });
            
            SHOP_ITEMS.special.forEach(item => {
                const price = getDiscountedPrice(item.price);
                const originalPrice = item.price;
                specialHtml += `
                    <div class="shop-item">
                        <div class="shop-item-info">
                            <h4>🎁 ${item.name}</h4>
                            <p>${item.desc}</p>
                        </div>
                        <div class="shop-item-price">
                            ${discountActive && originalPrice !== price ? `<div class="price-original">${originalPrice} 🎫</div>` : ''}
                            <div class="price-current">${price} 🎫</div>
                            <button class="btn-shop" onclick="window.buyShopItem('${item.id}', 'special')">Sotib olish</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = `
                <div class="wheel-container">
                    <h3>🛍 DO'KON ${discountText}</h3>
                    <div class="shop-category">
                        <div class="shop-category-title">⚡ BOOSTLAR</div>
                        ${boostsHtml}
                    </div>
                    <div class="shop-category">
                        <div class="shop-category-title">🎓 QUIZ POWERLAR</div>
                        ${quizHtml}
                    </div>
                    <div class="shop-category">
                        <div class="shop-category-title">👑 VIP TIZIMI</div>
                        ${vipHtml}
                    </div>
                    <div class="shop-category">
                        <div class="shop-category-title">🎁 MAXSUS ITEMLAR</div>
                        ${specialHtml}
                    </div>
                    <div class="spin-info" style="margin-top:20px">
                        📊 Sizning balansingiz:<br>
                        ⭐ Ball: ${userData.totalScore}<br>
                        🎫 Token: ${userData.tokens || 0}<br>
                        👑 VIP: ${userData.vip && userData.vip.endTime > Date.now()/1000 ? 'Faol' : 'Faol emas'}<br>
                        ⚡ Boost: ${currentState.currentBoostMultiplier}x
                    </div>
                </div>
            `;
        }

        function buyShopItem(itemId, category) {
            let item = null;
            if (category === 'boosts') item = SHOP_ITEMS.boosts.find(i => i.id === itemId);
            else if (category === 'quiz_powers') item = SHOP_ITEMS.quiz_powers.find(i => i.id === itemId);
            else if (category === 'vip') item = SHOP_ITEMS.vip.find(i => i.id === itemId);
            else if (category === 'special') item = SHOP_ITEMS.special.find(i => i.id === itemId);
            
            if (item) buyItem(item, category);
        }

        function getPointsValue(difficulty) {
            const points = {easy: 1, medium: 2, hard: 3};
            return points[difficulty] || 1;
        }

        function selectSubject(subject) {
            currentState.subject = subject;
            currentState.screen = 'difficulty';
            renderHome();
        }

        function startQuiz(difficulty) {
            currentState.difficulty = difficulty;
            let questions = QUESTIONS[currentState.subject][difficulty];
            currentState.questions = [...questions];
            for(let i = currentState.questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentState.questions[i], currentState.questions[j]] = [currentState.questions[j], currentState.questions[i]];
            }
            currentState.currentQuestion = 0;
            currentState.score = 0;
            currentState.screen = 'quiz';
            currentState.isPremiumQuiz = false;
            renderHome();
        }

        function startPremiumQuiz() {
            if(userData.premiumQuestions <= 0) {
                showNotification("Premium savollaringiz yo'q!", false);
                return;
            }
            const randomPremium = PREMIUM_QUESTIONS[Math.floor(Math.random() * PREMIUM_QUESTIONS.length)];
            currentState.questions = [randomPremium];
            currentState.currentQuestion = 0;
            currentState.score = 0;
            currentState.screen = 'quiz';
            currentState.isPremiumQuiz = true;
            renderHome();
        }

        function checkAnswer(selectedIdx) {
            const q = currentState.questions[currentState.currentQuestion];
            const selected = q.opts[selectedIdx];
            const isCorrect = selected === q.ans;
            
            if(isCorrect) {
                currentState.score++;
                showNotification("✅ TO'G'RI!");
            } else {
                showNotification(`❌ XATO! To'g'ri javob: ${q.ans}`, false);
            }
            
            currentState.currentQuestion++;
            
            if(currentState.currentQuestion >= currentState.questions.length) {
                finishQuiz();
            } else {
                renderHome();
            }
        }

        function finishQuiz() {
            let earnedPoints = currentState.score * getPointsValue(currentState.difficulty);
            earnedPoints = Math.floor(earnedPoints * currentState.currentBoostMultiplier);
            if (currentState.vipActive) earnedPoints = Math.floor(earnedPoints * 2);
            
            const percentage = (currentState.score / currentState.questions.length) * 100;
            
            userData.totalScore += earnedPoints;
            userData.quizCount++;
            
            // Token qo'shish (10 ball = 1 token)
            const earnedTokens = Math.floor(earnedPoints / 10);
            if (earnedTokens > 0) {
                userData.tokens = (userData.tokens || 0) + earnedTokens;
                showNotification(`+${earnedTokens} Token qo'shildi!`);
            }
            
            if(currentState.isPremiumQuiz) {
                userData.totalScore += 150;
                userData.premiumQuestions--;
                showNotification("⭐ PREMIUM SAVOL! +150 ball! ⭐");
            }
            
            userData.history.push({
                date: new Date().toISOString(),
                subject: currentState.subject,
                difficulty: currentState.difficulty,
                score: currentState.score,
                total: currentState.questions.length,
                percentage: percentage
            });
            
            if(percentage > userData.bestPercentage) {
                userData.bestPercentage = percentage;
            }
            
            saveUserData();
            currentState.screen = 'result';
            renderHome();
        }

        function goBack() {
            currentState.screen = 'main';
            renderHome();
        }

        function resetToMain() {
            currentState = {
                screen: 'main',
                subject: null,
                difficulty: null,
                currentQuestion: 0,
                score: 0,
                questions: [],
                isPremiumQuiz: false,
                activeTab: currentState.activeTab,
                isSpinning: false,
                currentBoostMultiplier: currentState.currentBoostMultiplier,
                vipActive: currentState.vipActive
            };
            updateActiveBoost();
            if (currentState.activeTab === 'home') renderHome();
            else if (currentState.activeTab === 'games') renderGames();
            else renderShop();
        }

        // Profil
        function openProfileModal() {
            document.getElementById('modalUserName').innerText = tgUser ? tgUser.first_name : 'User';
            document.getElementById('modalTotalScore').innerText = userData.totalScore;
            document.getElementById('modalTokens').innerText = userData.tokens || 0;
            document.getElementById('modalQuizCount').innerText = userData.quizCount;
            document.getElementById('modalBestScore').innerText = userData.bestPercentage + '%';
            document.getElementById('modalVipStatus').innerHTML = (userData.vip && userData.vip.endTime > Date.now()/1000) ? 'Faol 👑' : 'Faol emas';
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
        }

        // Avatar
        document.getElementById('avatarInput')?.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    userAvatar = ev.target.result;
                    localStorage.setItem('userAvatar_neon', userAvatar);
                    updateAvatarDisplay();
                    closeProfileModal();
                    showNotification("Profil rasmi o'zgartirildi!");
                };
                reader.readAsDataURL(file);
            }
        });

        // Tabs
        document.getElementById('tabHome')?.addEventListener('click', () => {
            currentState.activeTab = 'home';
            document.getElementById('tabHome').classList.add('active');
            document.getElementById('tabGames').classList.remove('active');
            document.getElementById('tabShop').classList.remove('active');
            currentState.screen = 'main';
            renderHome();
        });
        
        document.getElementById('tabGames')?.addEventListener('click', () => {
            currentState.activeTab = 'games';
            document.getElementById('tabGames').classList.add('active');
            document.getElementById('tabHome').classList.remove('active');
            document.getElementById('tabShop').classList.remove('active');
            renderGames();
        });

        document.getElementById('tabShop')?.addEventListener('click', () => {
            currentState.activeTab = 'shop';
            document.getElementById('tabShop').classList.add('active');
            document.getElementById('tabHome').classList.remove('active');
            document.getElementById('tabGames').classList.remove('active');
            renderShop();
        });

        document.getElementById('profileBtn')?.addEventListener('click', openProfileModal);
        
        // Neon zarralar
        function createNeonParticles() {
            for(let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'neon-particle';
                particle.style.width = Math.random() * 10 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 300 + 'px');
                particle.style.setProperty('--ty', (Math.random() - 0.5) * 300 + 'px');
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                document.body.appendChild(particle);
            }
        }
        
        createNeonParticles();
        loadUserData();
        renderHome();
        
        // Global funksiyalar
        window.selectSubject = selectSubject;
        window.startQuiz = startQuiz;
        window.startPremiumQuiz = startPremiumQuiz;
        window.checkAnswer = checkAnswer;
        window.goBack = goBack;
        window.resetToMain = resetToMain;
        window.getPointsValue = getPointsValue;
        window.buyShopItem = buyShopItem;
        window.spinWheel = spinWheel;
        window.showNotification = showNotification;
    </script>
</body>
</html>
